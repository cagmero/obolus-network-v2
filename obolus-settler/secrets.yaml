# Obolus CRE Secrets — stored in Chainlink DON vault
# These keys are split across DON nodes via threshold secret sharing.
# No single node can reconstruct any key.

secrets:
  - name: CRE_PRIVATE_KEY
    namespace: obolus-protocol
    description: "ECIES private key for decrypting shielded positions. Only exists inside TEE."

  - name: POOL_PRIVATE_KEY
    namespace: obolus-protocol
    description: "Pool wallet private key for signing vault transfers. Only CRE can use this."

  - name: INTERNAL_API_KEY
    namespace: obolus-protocol
    description: "API key for authenticating CRE → Obolus server internal endpoints."
